version: '3.8'

services:
  task-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    image: task-tracker-app:latest
    container_name: task_tracker_container
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

